# render.yaml - Render Auto-Deploy Configuration
# ==============================================
# এই ফাইল Render.com এ auto-deploy সেটআপ করে
# ==============================================

services:
  - type: web
    name: ahad-co-auth
    runtime: python
    region: singapore
    plan: free
    
    # Auto deploy from main branch
    autoDeploy: true
    
    # Build settings
    buildCommand: |
      pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    
    # Environment variables (Production এ Render Dashboard এ set করুন)
    envVars:
      - key: DB_PATH
        value: /data/database.db
      
      - key: BREVO_API_KEY
        # ⚠️ Render Dashboard > Environment > Add Environment Variable
        # Name: BREVO_API_KEY
        # Value: আপনার Brevo API Key
        sync: false
      
      - key: SENDER_EMAIL
        # ⚠️ Render Dashboard > Environment > Add Environment Variable
        # Name: SENDER_EMAIL
        # Value: noreply@yourdomain.com
        sync: false
      
      - key: SENDER_NAME
        value: Ahad Co
      
      - key: OTP_EXPIRY_MINUTES
        value: "10"
      
      - key: PYTHON_VERSION
        value: "3.11"

    # Persistent disk for database
    disk:
      name: ahad-data
      mountPath: /data
      sizeGB: 1

# Health check
healthCheckPath: /health

