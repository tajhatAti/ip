# render.yaml — Ahad Co Telegram Bot (Service #3)
# Deploy as its own Web Service on Render with Root Directory = bot
services:
  - type: web
    name: ahad-telegram-bot
    runtime: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        # ⚠️ Token from @BotFather — set in Render Dashboard > Environment
        sync: false
