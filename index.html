<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 450px;
        }

        .box {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            width: 100%;
            text-align: center;
        }

        .box h2 {
            color: #333;
            margin-bottom: 25px;
            font-size: 26px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .message {
            margin-top: 15px;
            padding: 12px;
            border-radius: 6px;
            display: none;
            text-align: left;
        }

        .error {
            display: block;
            background: #fff5f5;
            color: #c53030;
            border: 1px solid #fed7d7;
        }

        .success {
            display: block;
            background: #f0fff4;
            color: #2f855a;
            border: 1px solid #c6f6d5;
        }

        .info {
            display: block;
            background: #ebf8ff;
            color: #2c5282;
            border: 1px solid #bee3f8;
        }

        .hidden {
            display: none !important;
        }

        .link {
            color: #667eea;
            cursor: pointer;
            text-decoration: underline;
            margin-top: 20px;
            display: inline-block;
        }
    </style>
</head>

<body>

    <div class="container">
        <div id="signup-box" class="box">
            <h2>সাইনআপ করুন</h2>

            <input type="text" id="username" placeholder="ইউজারনেম (৩ অক্ষরের বেশি)">
            <input type="email" id="email" placeholder="ইমেইল">
            <input type="password" id="password" placeholder="পাসওয়ার্ড (৬ অক্ষরের বেশি)">

            <button onclick="signup()">সাইনআপ</button>

            <div id="signup-msg" class="message"></div>

            <p class="link" onclick="showLogin()">ইতিমধ্যে অ্যাকাউন্ট আছে? লগইন করুন</p>
        </div>

        <div id="verify-box" class="box hidden">
            <h2>OTP যাচাই</h2>

            <p>আপনার ইমেইলে ৬ ডিজিটের কোড পাঠানো হয়েছে</p>

            <input type="text" id="otp" placeholder="৬ ডিজিটের কোড" maxlength="6">

            <button onclick="verify()">ভেরিফাই</button>

            <div id="verify-msg" class="message"></div>

            <p class="link" onclick="showSignup()">পিছনে যান</p>
        </div>

        <div id="login-box" class="box hidden">
            <h2>লগইন</h2>

            <input type="text" id="login-user" placeholder="ইউজারনেম">
            <input type="password" id="login-pass" placeholder="পাসওয়ার্ড">

            <button onclick="login()">লগইন</button>

            <div id="login-msg" class="message"></div>

            <p class="link" onclick="showSignup()">নতুন অ্যাকাউন্ট তৈরি করুন</p>
        </div>

        <div id="dashboard-box" class="box hidden">
            <h2 style="color: green">লগইন সফল হয়েছে!</h2>
            <p id="welcome"></p>

            <button style="background: #e53e3e;" onclick="logout()">লগআউট</button>
        </div>
    </div>

    <script>
        let currentUser = "";

        function showSignup() {
            hideAll();
            document.getElementById("signup-box").classList.remove("hidden");
        }

        function showVerify() {
            hideAll();
            document.getElementById("verify-box").classList.remove("hidden");
        }

        function showLogin() {
            hideAll();
            document.getElementById("login-box").classList.remove("hidden");
        }

        function showDashboard() {
            hideAll();
            document.getElementById("dashboard-box").classList.remove("hidden");
            document.getElementById("welcome").innerText = "স্বাগতম " + currentUser + "!";
        }

        function hideAll() {
            document.querySelectorAll(".box").forEach(b => b.classList.add("hidden"));
            document.querySelectorAll(".message").forEach(m => {
                m.className = "message";
                m.innerText = "";
            });
        }

        async function signup() {
            const username = document.getElementById("username").value;
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const msg = document.getElementById("signup-msg");

            msg.className = "message info";
            msg.innerText = "অপেক্ষা করুন...";

            try {
                const res = await fetch("/signup", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, email, password })
                });

                const data = await res.json();

                if (res.ok) {
                    currentUser = username;
                    msg.className = "message success";
                    msg.innerText = data.message;

                    setTimeout(() => showVerify(), 1500);
                } else {
                    msg.className = "message error";
                    msg.innerText = data.detail;
                }
            } catch (e) {
                msg.className = "message error";
                msg.innerText = "সার্ভার সংযোগে সমস্যা";
            }
        }

        async function verify() {
            const otp = document.getElementById("otp").value;
            const msg = document.getElementById("verify-msg");

            msg.className = "message info";
            msg.innerText = "অপেক্ষা করুন...";

            try {
                const res = await fetch("/verify", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username: currentUser, otp })
                });

                const data = await res.json();

                if (res.ok) {
                    msg.className = "message success";
                    msg.innerText = data.message;

                    setTimeout(() => showLogin(), 1500);
                } else {
                    msg.className = "message error";
                    msg.innerText = data.detail;
                }
            } catch (e) {
                msg.className = "message error";
                msg.innerText = "সমস্যা হয়েছে";
            }
        }

        async function login() {
            const username = document.getElementById("login-user").value;
            const password = document.getElementById("login-pass").value;
            const msg = document.getElementById("login-msg");

            try {
                const res = await fetch("/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();

                if (res.ok) {
                    currentUser = data.username;
                    showDashboard();
                } else {
                    msg.className = "message error";
                    msg.innerText = data.detail;
                }
            } catch (e) {
                msg.className = "message error";
                msg.innerText = "সমস্যা হয়েছে";
            }
        }

        function logout() {
            currentUser = "";
            showSignup();
        }

        showSignup();
    </script>
</body>

</html>
