<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gmail OTP Login</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 25px 15px;
        }
        .wrap {
            width: 100%;
            max-width: 420px;
        }
        .card {
            background: #fff;
            border-radius: 14px;
            padding: 22px;
            margin-bottom: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
        }
        h1, h2 { text-align: center; margin-top: 0; }
        p { text-align: center; color: #666; }
        label {
            display: block;
            margin-top: 12px;
            margin-bottom: 6px;
            font-weight: bold;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 11px 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 15px;
        }
        button {
            width: 100%;
            margin-top: 14px;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            font-weight: bold;
        }
        .primary {
            background: #2563eb;
            color: white;
        }
        .primary:hover {
            background: #1d4ed8;
        }
        .secondary {
            background: #e5e7eb;
            color: #111;
        }
        .secondary:hover {
            background: #d1d5db;
        }
        .hidden { display: none; }
        .message {
            display: none;
            margin-top: 12px;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
        }
        .message.error {
            display: block;
            background: #fee2e2;
            color: #991b1b;
        }
        .message.success {
            display: block;
            background: #dcfce7;
            color: #166534;
        }
        .top-buttons {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .top-buttons button {
            width: auto;
            padding: 8px 14px;
            margin-top: 0;
            border-radius: 999px;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="card">
            <h1>🔐 OTP Login</h1>
            <p>Gmail দিয়ে OTP verification</p>
            <div class="top-buttons">
                <button class="secondary" onclick="showBox('signup-box')">Sign Up</button>
                <button class="secondary" onclick="showBox('verify-box')">Verify</button>
                <button class="secondary" onclick="showBox('login-box')">Login</button>
            </div>
        </div>

        <div id="signup-box" class="card">
            <h2>Sign Up</h2>
            <label>Username</label>
            <input type="text" id="sign-user" placeholder="যেমন: Ahad67">

            <label>Email</label>
            <input type="email" id="sign-email" placeholder="আপনার ইমেইল">

            <label>Password</label>
            <input type="password" id="sign-pass" placeholder="কমপক্ষে ৬ অক্ষর">

            <button class="primary" onclick="handleSignup(this)">সাইনআপ করুন</button>
            <div id="signup-msg" class="message"></div>
        </div>

        <div id="verify-box" class="card hidden">
            <h2>Verify OTP</h2>
            <label>Username</label>
            <input type="text" id="verify-user" placeholder="আপনার ইউজারনেম">

            <label>OTP</label>
            <input type="text" id="verify-otp" placeholder="৬ সংখ্যার OTP" maxlength="6">

            <button class="primary" onclick="handleVerify(this)">ভেরিফাই করুন</button>
            <button class="secondary" onclick="handleResendOTP(this)">আবার OTP পাঠান</button>
            <div id="verify-msg" class="message"></div>
        </div>

        <div id="login-box" class="card hidden">
            <h2>Login</h2>
            <label>Username</label>
            <input type="text" id="login-user" placeholder="আপনার ইউজারনেম">

            <label>Password</label>
            <input type="password" id="login-pass" placeholder="আপনার পাসওয়ার্ড">

            <button class="primary" onclick="handleLogin(this)">লগইন</button>
            <div id="login-msg" class="message"></div>
        </div>

        <div id="dashboard-box" class="card hidden">
            <h2 style="color:green;">🎉 লগইন সফল!</h2>
            <p id="welcome-text">আপনি লগইন করেছেন।</p>
            <button class="secondary" onclick="logout()">Logout</button>
        </div>
    </div>

    <script>
        function showBox(id) {
            ["signup-box", "verify-box", "login-box", "dashboard-box"].forEach(box => {
                document.getElementById(box).classList.add("hidden");
            });
            document.getElementById(id).classList.remove("hidden");
            clearMessages();
        }

        function clearMessages() {
            ["signup-msg", "verify-msg", "login-msg"].forEach(id => {
                const el = document.getElementById(id);
                el.className = "message";
                el.textContent = "";
            });
        }

        function setMessage(id, text, type = "error") {
            const el = document.getElementById(id);
            el.textContent = text;
            el.className = "message " + type;
        }

        function setLoading(btn, state, text="Please wait...") {
            if (state) {
                btn.dataset.old = btn.textContent;
                btn.textContent = text;
                btn.disabled = true;
            } else {
                btn.textContent = btn.dataset.old || btn.textContent;
                btn.disabled = false;
            }
        }

        async function postJSON(url, payload) {
            const res = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            let data = {};
            try { data = await res.json(); } catch {}

            if (!res.ok) throw new Error(data.detail || "কিছু একটা ভুল হয়েছে।");
            return data;
        }

        async function handleSignup(btn) {
            clearMessages();
            const username = document.getElementById("sign-user").value.trim();
            const email = document.getElementById("sign-email").value.trim();
            const password = document.getElementById("sign-pass").value.trim();

            if (!username || !email || !password) {
                setMessage("signup-msg", "সব ঘর পূরণ করুন।");
                return;
            }

            setLoading(btn, true, "সাইনআপ হচ্ছে...");
            try {
                const data = await postJSON("/signup", { username, email, password });
                document.getElementById("verify-user").value = username;
                document.getElementById("login-user").value = username;
                showBox("verify-box");
                setMessage("verify-msg", data.message, "success");
            } catch (e) {
                setMessage("signup-msg", e.message);
            } finally {
                setLoading(btn, false);
            }
        }

        async function handleVerify(btn) {
            clearMessages();
            const username = document.getElementById("verify-user").value.trim();
            const otp = document.getElementById("verify-otp").value.trim();

            if (!username || !otp) {
                setMessage("verify-msg", "ইউজারনেম এবং OTP দিন।");
                return;
            }

            setLoading(btn, true, "ভেরিফাই হচ্ছে...");
            try {
                const data = await postJSON("/verify", { username, otp });
                document.getElementById("login-user").value = username;
                showBox("login-box");
                setMessage("login-msg", data.message, "success");
            } catch (e) {
                setMessage("verify-msg", e.message);
            } finally {
                setLoading(btn, false);
            }
        }

        async function handleResendOTP(btn) {
            clearMessages();
            const username = document.getElementById("verify-user").value.trim();

            if (!username) {
                setMessage("verify-msg", "আগে ইউজারনেম লিখুন।");
                return;
            }

            setLoading(btn, true, "OTP পাঠানো হচ্ছে...");
            try {
                const data = await postJSON("/resend-otp", { username });
                setMessage("verify-msg", data.message, "success");
            } catch (e) {
                setMessage("verify-msg", e.message);
            } finally {
                setLoading(btn, false);
            }
        }

        async function handleLogin(btn) {
            clearMessages();
            const username = document.getElementById("login-user").value.trim();
            const password = document.getElementById("login-pass").value.trim();

            if (!username || !password) {
                setMessage("login-msg", "ইউজারনেম এবং পাসওয়ার্ড দিন।");
                return;
            }

            setLoading(btn, true, "লগইন হচ্ছে...");
            try {
                const data = await postJSON("/login", { username, password });
                showBox("dashboard-box");
                document.getElementById("welcome-text").textContent = `${data.username}, আপনি সফলভাবে লগইন করেছেন।`;
            } catch (e) {
                setMessage("login-msg", e.message);
            } finally {
                setLoading(btn, false);
            }
        }

        function logout() {
            showBox("login-box");
        }
    </script>
</body>
    </html>
